{% extends "base.html" %}
{% block title %}{{ t('auth.login_title') }} · {{ SITE_NAME }}{% endblock %}

{% block content %}
<div class="auth-card">
  <h1>{{ t('auth.login_title') }}</h1>
  <form method="post" action="{{ url_for('login', next=request.args.get('next','')) }}">
    <div class="mb-3">
      <label class="form-label">{{ t('auth.username') }} / {{ t('auth.email') }}</label>
      <input type="text" name="login" class="form-control" required value="{{ request.form.get('login','') }}">
    </div>
    <div class="mb-3">
      <label class="form-label">{{ t('auth.password') }}</label>
      <input type="password" name="password" class="form-control" required>
    </div>
    <div class="form-check mb-3">
      <input class="form-check-input" type="checkbox" name="remember" value="1" id="rememberMe" checked>
      <label class="form-check-label" for="rememberMe">{{ t('auth.remember') }}</label>
    </div>
    <button type="submit" class="btn btn-vip w-100">{{ t('auth.login') }}</button>
  </form>
  <p class="auth-switch">
    <a href="{{ url_for('register', next=request.args.get('next','')) }}">{{ t('auth.to_register') }}</a>
    <span class="text-muted">·</span>
    <a href="{{ url_for('forgot') }}">{{ t('auth.forgot') }}</a>
  </p>
</div>
{% endblock %}
