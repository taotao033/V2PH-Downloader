{% extends "base.html" %}
{% block title %}{{ t('reset.title') }} · {{ SITE_NAME }}{% endblock %}

{% block content %}
<div class="auth-card">
  <h1>{{ t('reset.title') }}</h1>
  <form method="post" action="{{ url_for('reset_password', token=token) }}">
    <div class="mb-3">
      <label class="form-label">{{ t('auth.password') }}</label>
      <input type="password" name="password" class="form-control" required autofocus>
    </div>
    <div class="mb-3">
      <label class="form-label">{{ t('auth.password2') }}</label>
      <input type="password" name="password2" class="form-control" required>
    </div>
    <button type="submit" class="btn btn-vip w-100">{{ t('reset.submit') }}</button>
  </form>
</div>
{% endblock %}
